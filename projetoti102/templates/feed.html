{% extends "homepage.html" %}

{% block titulo %}
Feed
{% endblock %}

{% block body %}

<h1>Feed</h1>

{% for foto in fotos %}
    <div class="post">
        <a href="{{ url_for('perfil', id_usuario=foto.usuario.id) }}">
            <img src="{{ url_for('static', filename='fotos_posts/' + foto.imagem) }}" width="300">
        </a>
        <p>Publicado por: <a href="{{ url_for('perfil', id_usuario=foto.usuario.id) }}">{{ foto.usuario.username }}</a></p>
        <p>{{ foto.data_criacao }}</p>
    </div>
{% endfor %}

{% endblock %}
